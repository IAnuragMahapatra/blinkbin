user blinkbin;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $request [$status] $body_bytes_sent';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    # rate limit create endpoint only — 5 req/min per IP
    geo $limit_ip {
        default $binary_remote_addr;
    }
    map $request_method $limit_create {
        default "";
        POST    $limit_ip;
    }
    limit_req_zone $limit_create zone=create:10m rate=5r/m;
    limit_req_status 429;

    server {
        listen 80;
        server_name _;

        # security headers
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; connect-src 'self' https://api.drand.sh; style-src 'self'; font-src 'self';" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # API — proxied to FastAPI
        location /api/ {
            proxy_pass http://fastapi:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # CORS from nginx as fallback
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # rate limit create specifically
        location = /api/paste {
            proxy_pass http://fastapi:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            limit_req zone=create burst=3 nodelay;

            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # health check
        location /health {
            proxy_pass http://fastapi:8000/health;
        }
    }
}

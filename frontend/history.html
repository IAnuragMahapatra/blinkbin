<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BlinkBin — Paste History</title>
  <meta name="description" content="Your locally encrypted paste history — only you can read it." />
  <meta name="robots" content="noindex, nofollow" />

  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="/css/index.css" />
</head>
<body class="page">

  <nav class="nav" role="navigation" aria-label="Main navigation">
    <a href="/" class="nav-logo" aria-label="BlinkBin home">Blink<span>Bin</span></a>
    <ul class="nav-links" role="list">
      <li><a href="/">New Paste</a></li>
      <li><a href="/history.html" class="active" aria-current="page">History</a></li>
    </ul>
  </nav>

  <main class="layout-well">

    <h1 class="text-2xl fw-600 text-strong mb-8">Paste History</h1>

    <!-- Password gate (setup + unlock) -->
    <div id="history-gate" hidden>
      <div class="history-gate">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
          style="color:var(--color-text-faint)" aria-hidden="true">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>

        <div>
          <h2 class="text-xl fw-600 text-strong" id="gate-title">Your paste history</h2>
          <p class="text-sm text-muted mt-2" id="gate-subtitle"></p>
        </div>

        <!-- First-time warning -->
        <div class="burn-banner" id="gate-warning" role="alert" hidden>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;margin-top:1px" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <p class="burn-banner-text">If you forget your history password, it cannot be recovered. There is no reset mechanism.</p>
        </div>

        <form class="password-prompt-form" id="gate-form" novalidate style="text-align:left">
          <div class="form-group">
            <label class="form-label" for="gate-password">Password</label>
            <input class="form-input" type="password" id="gate-password"
              placeholder="History password" autocomplete="current-password"
              minlength="8" autofocus />
          </div>
          <div class="form-group" id="gate-confirm">
            <label class="form-label" for="gate-confirm-input">Confirm password</label>
            <input class="form-input" type="password" id="gate-confirm-input"
              placeholder="Confirm password" autocomplete="new-password" minlength="8" />
          </div>
          <p class="text-sm text-danger" id="gate-error" hidden role="alert"></p>
          <button type="submit" class="btn btn-primary w-full">Unlock History</button>
        </form>

      </div>
    </div>

    <!-- History section (shown after unlock) -->
    <div id="history-section" hidden>

      <div id="empty-history" class="empty-history" hidden>
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
        <p class="text-base">No pastes yet.</p>
        <p class="text-sm">Create a paste and it will appear here.</p>
        <a href="/" class="btn btn-ghost mt-2">Create paste</a>
      </div>

      <div id="history-table-wrap" class="history-table-wrap" hidden>
        <table class="history-table" aria-label="Paste history">
          <thead>
            <tr>
              <th data-col="label" scope="col">Label</th>
              <th data-col="language" scope="col">Language</th>
              <th data-col="created_at" scope="col">Created</th>
              <th data-col="expires_at" scope="col">Expires</th>
              <th scope="col">Actions</th>
            </tr>
          </thead>
          <tbody id="history-tbody">
          </tbody>
        </table>
      </div>

    </div>

  </main>

  <script type="module" src="/js/history.js"></script>
</body>
</html>
